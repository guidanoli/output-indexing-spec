<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 250" role="img" aria-label="Execution flow with topic envelope">
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,6 L9,3 z" fill="#526173"/>
        </marker>
        <style>
          .box{fill:#fff;stroke:#c5d1df;stroke-width:1.4}
          .blue{fill:#eaf1fc;stroke:#8fb1e2}
          .green{fill:#e8f6ef;stroke:#8ec9ad}
          .gold{fill:#fff7dd;stroke:#d9bf5d}
          .t{font:13px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#17202a}
          .h{font:700 14px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#17202a}
          .m{font:12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#526173}
        </style>
      </defs>
      <rect x="44" y="70" width="174" height="82" rx="9" class="blue"/>
      <text x="131" y="100" text-anchor="middle" class="h">Output bytes</text>
      <text x="131" y="123" text-anchor="middle" class="m">topic0..3 + data</text>

      <line x1="218" y1="111" x2="306" y2="111" stroke="#526173" stroke-width="2" marker-end="url(#arrow)"/>

      <rect x="306" y="70" width="188" height="82" rx="9" class="box"/>
      <text x="400" y="100" text-anchor="middle" class="h">Application</text>
      <text x="400" y="123" text-anchor="middle" class="m">validate proof</text>

      <line x1="494" y1="111" x2="582" y2="111" stroke="#526173" stroke-width="2" marker-end="url(#arrow)"/>

      <rect x="582" y="38" width="260" height="146" rx="9" class="green"/>
      <text x="712" y="70" text-anchor="middle" class="h">Dispatch by topic0</text>
      <text x="712" y="98" text-anchor="middle" class="m">NOTICE: not executable</text>
      <text x="712" y="122" text-anchor="middle" class="m">VOUCHER: call topic1</text>
      <text x="712" y="146" text-anchor="middle" class="m">DELEGATE: delegatecall topic1</text>
    </svg>
